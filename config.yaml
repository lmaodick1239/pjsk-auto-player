# PJSK Auto Player 配置文件
# Project Sekai (プロジェクトセカイ) 自动执行 AP 工具

# ============================================================
# ADB 配置
# ============================================================
adb:
  # ADB 可执行文件路径 (Windows 下用 adb.exe)
  # 留空则自动从 PATH 查找
  executable: "adb"

  # 设备序列号 (多设备时指定)
  # 留空则自动选择唯一连接的设备
  device_serial: ""

  # screencap 方法:
  #   "auto"      - 自动检测最快可用后端: scrcpy > raw > exec-out (推荐)
  #   "raw"       - adb exec-out screencap 无压缩 (10-25 FPS, 比 PNG 快 2-3x)
  #   "exec-out"  - adb exec-out screencap -p (5-15 FPS, 兼容性最佳)
  #   "file"      - adb shell screencap + adb pull (较慢)
  #   "scrcpy"    - 仅 scrcpy (需安装, 30-60 FPS)
  screencap_method: "auto"

  # v5.2: 异步截屏 (producer-consumer 模式)
  # 后台线程持续截屏, 主线程直接取缓存帧 (零延迟)
  # 通常能提升 30-50% 帧率
  async_capture: true

  # 截图临时目录 (仅 screencap_method=file 时需要)
  temp_dir: "/sdcard/"

# ============================================================
# scrcpy 后端配置 (仅 screencap_method=scrcpy 时生效)
# ============================================================
scrcpy:
  # scrcpy 可执行文件路径 (自动从 PATH 查找)
  executable: "scrcpy"

  # 最大 FPS 限制 (scrcpy 实际帧率取决于手机和 USB)
  max_fps: 60

  # 视频码率 (bps) — 高码率降低模糊延迟
  bit_rate: 12000000

  # 分辨率缩放 (1=原始, 0.5=半分辨率, 0.25=四分之一)
  # 低分辨率可以提高帧率, 但不影响触摸坐标 (scrcpy 会自动映射)
  scale: 0.5

  # 帧跳过: 只处理最新帧, 丢弃积压旧帧以降低处理延迟
  frame_skip: true

# ============================================================
# 屏幕参数 (根据手机分辨率设置)
# ============================================================
screen:
  # 手机屏幕分辨率 (宽 x 高)
  width: 1080
  height: 2400

  # 所有坐标均为 "相对比例" (0.0 ~ 1.0), 运行时自动乘以屏幕分辨率

  # 判定线 Y 坐标 (相对比例, 屏幕顶部为 0, 底部为 1)
  judgment_line_y: 0.78

  # 判定线上方检测区域 (note 出现区, 用于提前检测和预测)
  # screen_top_ratio: 判定线以上多少比例的区域用于检测 note 出现
  # 例如 0.35 表示从判定线往上 35% 屏幕高度的区域
  note_detect_region_ratio: 0.35

  # 左侧判定区 X 坐标 (相对比例)
  left_lanes: [0.15, 0.25, 0.35]

  # 右侧判定区 X 坐标 (相对比例)
  right_lanes: [0.65, 0.75, 0.85]

  # 判定检测区域大小 (像素半径, 判定点周围取多大区域检测)
  detect_radius: 30

# ============================================================
# 图像检测参数
# ============================================================
detection:
  # 检测方法: "brightness" (亮度) 或 "color" (颜色)
  method: "brightness"

  # ---- 亮度法参数 ----
  brightness:
    # 灰度阈值 (0-255), 大于此值的像素视为"亮"
    # PJSK 的 note 在深色背景上很亮, 通常阈值 180-220
    threshold: 200

    # 轮廓最小面积 (过滤噪声)
    min_contour_area: 50
    # 轮廓最大面积 (过滤大型UI元素)
    max_contour_area: 500

  # ---- 颜色法参数 ----
  color:
    # HSV 范围: [H_min, S_min, V_min, H_max, S_max, V_max]
    white_range: [0, 0, 200, 180, 50, 255]
    color_range: [0, 80, 150, 180, 255, 255]

  # ---- 防误触 ----
  # 连续多少次检测到同一位置才算有效 (过滤闪烁/特效)
  confirmation_frames: 1

  # 忽略区域 (矩形列表, 相对坐标 [x1, y1, x2, y2])
  # 用于排除分数显示、技能按钮等
  ignore_regions:
    - [0.0, 0.0, 1.0, 0.08]   # 顶部: 分数/血量
    - [0.0, 0.92, 1.0, 1.0]   # 底部: 暂停按钮等

  # ---- Flick 方向检测 ----
  flick:
    # 方法: "gradient" (梯度法) 或 "template" (模板匹配, 需预存模板图)
    method: "gradient"
    # 模板图片目录 (method=template 时需要)
    template_dir: "flick_templates"

# ============================================================
# 点击随机化 (反封号) —— 模拟人类操作，避免精确重复
# ============================================================
randomization:
  # 是否启用点击随机化
  enabled: true

  # 时机抖动 (毫秒): 在精确计算的时间上随机偏移 ±Xms
  # PJSK 判定窗口: PERFECT ~±25ms, GREAT ~±50ms, GOOD ~±100ms
  # 推荐 ±15ms (大部分 PERFECT 内，偶尔 GREAT)
  timing_jitter_ms: 15

  # 坐标抖动 (像素): 点击位置随机偏移 ±Xpx
  # 模拟手指点击不是 100% 精确同一位置
  # 对于大屏幕手机 (1080x2400) 推荐 4-8px
  position_jitter_px: 5

  # 偶尔漏键概率: 0.0 ~ 0.01
  # 每帧每个 note 有该概率被跳过 (模拟人类偶尔失误)
  # 设置为 0 则不故意漏键。注意: 这会影响 AP 率
  miss_chance: 0.001

  # 长按时长抖动 (毫秒): 长按持续时间随机增减范围
  hold_duration_jitter_ms: 30

  # 结算画面点击间隔抖动 (秒): 跳过结算时随机化等待时间
  # 模拟人类并非每次都等固定时间
  result_tap_jitter: 0.8

# ============================================================
# 触摸控制参数
# ============================================================
touch:
  # 触摸方式: "input_tap" (adb input tap) 或 "sendevent"
  method: "input_tap"

  # 轻击持续时间 (毫秒)
  tap_duration_ms: 30

  # 长按判定: 如果同一位置连续检测到 > 该帧数, 视为长按
  hold_threshold_frames: 3

  # 拖动 (flick note): 滑动距离 (像素)
  flick_distance: 150
  flick_duration_ms: 50

# ============================================================
# 预测引擎 (核心改进: 提前检测 note → 计算到达时间 → 准时触发)
# ============================================================
prediction:
  # 是否启用预测引擎 (强烈建议开启)
  enabled: true

  # 预测触发提前量 (毫秒)
  # 系统会自动测量 ADB 延迟并计算最佳提前量
  # 设置 0 则完全依赖自动测量值
  manual_advance_ms: 0

  # 预测窗口: 检测 note 时向前看多少毫秒的轨迹
  # 值越大检测范围越大, 但可能引入误检
  lookahead_ms: 500

  # 最小追踪帧数: 一个 note 连续出现多少帧后才认为是有效 note (过滤闪烁特效)
  min_track_frames: 2

  # 速度平滑窗口: 计算 note 滚动速度时取多少帧的平均值
  velocity_smooth_window: 3

  # 谱面缓存: 跨歌曲保留 note 滚动速度 (默认启用)
  # 弹出后 NoteTracker.reset() 保留已学习的 velocity 而不是清零
  # 同一首歌反复刷时跳过 2-3 帧的重新校准期
  velocity_cache: true

# ============================================================
# 时序与延迟补偿
# ============================================================
timing:
  # 延迟补偿 (毫秒, 正值 = 提前触发)
  # 启用预测引擎后此项会被自动覆盖
  latency_compensation_ms: 0

  # 单帧间隔下限 (毫秒), 防止自动连续跑太快
  # 推荐: 5ms (ADB) 或 3ms (scrcpy)
  min_frame_interval_ms: 5

  # 超时检测: 多久没检测到判定线活动就认为歌曲结束 (秒)
  game_over_timeout: 5.0

  # ═══ v4.8.0: 自适应延迟 PID 控制器 ═══
  # 每首歌结束后基于实际触发提前量自动微调延迟补偿
  adaptive_latency:
    enabled: true        # 启用 PID 自适应
    kp: 0.3              # 比例增益 (快速响应)
    ki: 0.05             # 积分增益 (消除稳态误差)
    kd: 0.1              # 微分增益 (抑制超调)
    target_advance_ms: 15  # 目标提前量, 越小越激进 (ms)
    min_samples: 50      # 最少需要多少样本才触发调整

# ============================================================
# 实时显示与热键
# ============================================================
display:
  # 在终端实时显示 FPS / note 统计 / 延迟信息
  show_stats: true

  # 统计信息更新间隔 (帧数)
  stats_interval_frames: 15

  # 热键控制:
  #   P      - 暂停/继续
  #   Q      - 退出
  #   +/-    - 微调延迟补偿 (±5ms)
  #   [/]    - 微调亮度阈值 (±5)
  #   Space  - 强制截屏分析一次
  hotkeys_enabled: true

# ============================================================
# 配置档案 (Profile)
# ============================================================
profile:
  # 当前使用的配置档案名称
  # 不同的手机或歌曲可以用不同的档案
  # 留空 = 使用 config.yaml 本身
  name: ""

  # 档案存储目录
  directory: "profiles"

# ============================================================
# 连续执行 (Continuous Execution) —— 自动连续执行
# ============================================================
batch_play:
  # 默认执行次数 (0 = 无限)
  default_count: 0

  # 执行模式浮动权重: 连续执行时每首歌随机切换模式, 模拟人类发挥波动
  # AP   = All Perfect   (极致精确)
  # FC   = Full Combo    (不漏键但有 GREAT)
  # LIVE = Live Clear    (允许失误, 保底通关)
  mode_weights:
    AP: 25
    FC: 70
    LIVE: 5

  # 歌曲结束时等待结算动画的时间 (秒)
  result_wait_seconds: 4.0

  # 结算画面逐次点击间隔 (秒), 用于点掉结算画面返回选歌
  result_tap_interval: 2.5

  # 结算画面最大点击次数 (防止卡在某个界面无限点击)
  max_result_taps: 15

  # 新一曲开始前最大等待时间 (秒), 超过则报错退出
  next_song_timeout: 30.0

  # 单曲超时 (秒) —— 超过此时间判定一首歌卡住, 自动跳过
  song_timeout: 360

  # 连续截图失败多少次后放弃当前歌曲
  max_failures_per_song: 20

# ============================================================
# Pipeline 流水线 (v3.0.0+)
# ============================================================
pipeline:
  # 是否启用 Pipeline 引擎 (连续执行时自动使用)
  enabled: true

  # 任务定义文件目录
  tasks_dir: "tasks"

  # 模板图片目录
  templates_dir: "templates"

  # 默认匹配阈值 (0~1)
  default_threshold: 0.8

# ============================================================
# Minitouch 配置 (可选, 低延迟触摸后端)
# ============================================================
minitouch:
  # 自动初始化 minitouch (启动执行时自动推送和连接)
  auto_init: true

  # minitouch 二进制路径 (留空则自动在 bin/minitouch/ 下查找)
  binary_path: ""

# ============================================================
# OCR 配置 (可选, 阅读结算画面分数)
# ============================================================
ocr:
  # OCR 引擎: "easyocr", "tesseract", "auto" (自动选择可用引擎)
  engine: "auto"

  # 是否在连续执行时记录分数
  read_scores: true

# ============================================================
# 游戏内设置自动读取 (v5.3.0+)
# ============================================================
game_settings:
  # 是否在启动时自动读取游戏内参数 (タイミング調整 + ノーツ速度)
  auto_read: true

  # 读取频率: "once" = 每次启动读一次, "every_song" = 每首歌后重读
  frequency: "once"

  # 目标服务器: "auto" | "jp" | "tw" | "cn" | "kr" | "en"
  server: "auto"

  # 上次读取结果 (自动记录, 请勿手动修改)
  last_read_timing_offset: 0
  last_read_note_speed: 10.0
  last_calibration_time: ""
  detected_server: ""

  # 校准: 是否自动将游戏参数写入软件配置
  auto_calibrate: true

  # 校准参数
  timing_unit_ms: 1.0           # 游戏 timing 1 单位 ≈ 多少 ms
  default_note_speed: 10.0       # 基准速度 (用于速度缩放)

# ============================================================
# 日志与调试
# ============================================================
debug:
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  log_level: "DEBUG"

  # 是否保存检测截图 (用于调试, 保存在 debug_output/ 目录)
  save_debug_frames: false

  # 调试输出目录
  debug_dir: "debug_output"

  # 显示实时检测窗口 (在电脑上显示 OpenCV 窗口)
  show_preview: false
