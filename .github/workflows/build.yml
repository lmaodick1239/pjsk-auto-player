name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pjsk-auto-player-linux
            asset_name: pjsk-auto-player-linux-x86_64
          - os: macos-latest
            artifact_name: pjsk-auto-player-macos
            asset_name: pjsk-auto-player-macos-universal
          - os: windows-latest
            artifact_name: pjsk-auto-player.exe
            asset_name: pjsk-auto-player-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python-headless numpy pyyaml

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.artifact_name }}" \
            --add-data "tasks:tasks" \
            --add-data "templates:templates" \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import yaml \
            --hidden-import pipeline \
            --hidden-import adb_controller \
            --hidden-import screen_analyzer \
            --hidden-import auto_play \
            --hidden-import ocr_reader \
            --hidden-import web_dashboard \
            --hidden-import scene_classifier \
            --hidden-import capture_optimizer \
            --hidden-import setup_wizard \
            --exclude-module tkinter \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module PIL \
            --exclude-module pandas \
            --exclude-module torch \
            --console \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 7

  # 每次 push 到 main 时 — 上传构建产物 (可从 Actions 页面下载)
  # 推 v* tag 时 — 自动创建 GitHub Release

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: pjsk-auto-player-*
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # 生成 changelog: 从上一个 tag 到当前
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null > /tmp/changelog.txt
          else
            echo "Initial release" > /tmp/changelog.txt
          fi
          echo "notes_file=/tmp/changelog.txt" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: /tmp/changelog.txt
          files: |
            pjsk-auto-player-linux-x86_64
            pjsk-auto-player-macos-universal
            pjsk-auto-player-windows-x86_64.exe
          generate_release_notes: true
          make_latest: true
