name: Auto Tag & Release

# ═══════════════════════════════════════════════════════════════
# 每次 push 到 main 自动:
#   1. 读取 VERSION 文件
#   2. 检查对应 tag (vX.Y.Z) 是否已存在
#   3. 不存在 → 自动创建 annotated tag + push → 触发 build.yml 构建 Release
#
# 跳过条件:
#   - commit message 包含 [skip ci] 或 skip-tag
#   - 只改了 .md / .github / scripts / tests / resource / locale
# ═══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "VISION.md"
      - ".github/**"
      - "scripts/**"
      - "tests/**"
      - "resource/**"
      - "locale/**"

permissions:
  contents: write

jobs:
  auto-tag:
    name: Auto Tag (if VERSION changed)
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'skip-tag')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: version
        run: |
          if [ -f VERSION ]; then
            VER=$(cat VERSION | tr -d '[:space:]')
            echo "version=$VER" >> $GITHUB_OUTPUT
            echo "tag=v$VER" >> $GITHUB_OUTPUT
            echo "VERSION: $VER"
          else
            echo "VERSION file not found, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag exists
        id: check
        if: steps.version.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG not found → will create"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes from CHANGELOG
        id: notes
        if: steps.check.outputs.exists == 'false'
        run: |
          VER="${{ steps.version.outputs.version }}"
          NOTES_FILE="/tmp/release_notes.md"
          echo "## PJSK Auto Player v${VER}" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## \[${VER}\]/,/^## \[/p" CHANGELOG.md | sed '$d' >> "$NOTES_FILE"
          fi
          if [ $(wc -l < "$NOTES_FILE") -le 2 ]; then
            echo "### Changes" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            git log --oneline --no-decorate -15 >> "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT
          echo "--- Release Notes ---"
          cat "$NOTES_FILE"

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VER="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "v${VER} - Auto-release by CI"

          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed → triggers build.yml"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }} - PJSK Auto Player
          bodyFile: ${{ steps.notes.outputs.notes_file }}
          makeLatest: true
          prerelease: false
          skipIfReleaseExists: true
